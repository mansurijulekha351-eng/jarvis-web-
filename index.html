<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis AI</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #0f2027, #203a43, #2c5364);
    color:white;
    text-align:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
    font-size:40px;
    letter-spacing:3px;
}

.circle{
    width:150px;
    height:150px;
    border-radius:50%;
    border:4px solid cyan;
    box-shadow:0 0 30px cyan;
    margin:20px 0;
    animation: pulse 2s infinite;
}

@keyframes pulse{
    0%{ box-shadow:0 0 20px cyan;}
    50%{ box-shadow:0 0 60px cyan;}
    100%{ box-shadow:0 0 20px cyan;}
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:cyan;
    color:black;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:white;
}

#response{
    margin-top:20px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>JARVIS</h1>
<p>Your Web AI Assistant</p>

<div class="circle"></div>

<button onclick="activateJarvis()">Activate Jarvis</button>

<div id="response"></div>

<script>
function activateJarvis(){
    let text = "Yes Sir. Jarvis is online.";
    let speech = new SpeechSynthesisUtterance(text);
    speech.pitch = 1;
    speech.rate = 1;
    speechSynthesis.speak(speech);

    document.getElementById("response").innerHTML = "Jarvis Activated ?";
}
</script>

</body>
</html>
